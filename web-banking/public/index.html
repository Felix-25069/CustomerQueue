<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Banking System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
        }

        .auth-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bank-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .bank-logo i {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 10px;
        }

        .bank-logo h1 {
            font-size: 28px;
            color: #333;
            font-weight: 700;
            margin: 0;
        }

        .bank-logo p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: block;
        }

        .form-control {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
            outline: none;
        }

        .btn-primary-custom {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary-custom:active {
            transform: translateY(0);
        }

        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .auth-toggle a {
            color: #667eea;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
        }

        .auth-toggle a:hover {
            text-decoration: underline;
        }

        .alert-custom {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-error {
            background-color: #fee;
            border: 1px solid #fcc;
            color: #c33;
        }

        .alert-success {
            background-color: #efe;
            border: 1px solid #cfc;
            color: #3c3;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .text-center a {
            color: #667eea;
            text-decoration: none;
        }

        .text-center a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Alert Message -->
            <div id="alertMessage" class="alert-custom"></div>

            <!-- Login Form -->
            <div id="loginSection" class="form-section active">
                <div class="bank-logo">
                    <i class="fas fa-university"></i>
                    <h1>SecureBank</h1>
                    <p>Professional Banking System</p>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Account Number</label>
                        <input type="text" class="form-control" id="loginAccountNumber" placeholder="Enter your account number" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">PIN (4 digits)</label>
                        <input type="password" class="form-control" id="loginPin" placeholder="Enter your PIN" maxlength="4" required>
                    </div>

                    <button type="submit" class="btn-primary-custom">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>

                <div class="auth-toggle">
                    Don't have an account? <a onclick="toggleForms()">Register Now</a>
                </div>
            </div>

            <!-- Register Form -->
            <div id="registerSection" class="form-section">
                <div class="bank-logo">
                    <i class="fas fa-user-plus"></i>
                    <h1>Create Account</h1>
                    <p>Join SecureBank Today</p>
                </div>

                <form id="registerForm">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="registerName" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="registerEmail" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Account Number</label>
                        <input type="text" class="form-control" id="registerAccountNumber" placeholder="Choose account number" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">PIN (4 digits)</label>
                        <input type="password" class="form-control" id="registerPin" placeholder="Enter 4-digit PIN" maxlength="4" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirm PIN</label>
                        <input type="password" class="form-control" id="confirmPin" placeholder="Confirm your PIN" maxlength="4" required>
                    </div>

                    <button type="submit" class="btn-primary-custom">
                        <i class="fas fa-user-check"></i> Create Account
                    </button>
                </form>

                <div class="auth-toggle">
                    Already have an account? <a onclick="toggleForms()">Login Here</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="auth.js"></script>
</body>
</html>
